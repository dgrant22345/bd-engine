<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Commercial BD operating system for account prioritization, ATS visibility, live job intelligence, and admin pipeline control.">
  <meta name="application-name" content="BD Engine">
  <meta name="theme-color" content="#0f1728">
  <meta name="color-scheme" content="light dark">
  <title>BD Engine | Commercial Revenue Intelligence</title>
  <link rel="stylesheet" href="/styles.css?v=20260425-v0-polish-setup-bg-2">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/icons/icon-192.svg">
  <link rel="apple-touch-icon" href="/icons/icon-192.svg">
</head>
<body>
  <div class="page-noise" aria-hidden="true"></div>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand-card">
        <p class="eyebrow">Commercial BD platform</p>
        <h1>BD Engine</h1>
        <p class="brand-copy">Commercial BD intelligence, live hiring coverage, and ATS import orchestration in one place.</p>
      </div>
      <nav class="nav" aria-label="Primary">
        <a href="#/dashboard" data-route="dashboard"><span class="nav-label">Dashboard</span><span class="nav-shortcut">G D</span></a>
        <a href="#/accounts" data-route="accounts"><span class="nav-label">Accounts</span><span class="nav-shortcut">G A</span></a>
        <a href="#/contacts" data-route="contacts"><span class="nav-label">Contacts</span><span class="nav-shortcut">G C</span></a>
        <a href="#/jobs" data-route="jobs"><span class="nav-label">Jobs</span><span class="nav-shortcut">G J</span></a>
        <a href="#/admin" data-route="admin"><span class="nav-label">Admin</span><span class="nav-shortcut">G X</span></a>
      </nav>
      <div class="sidebar-footnote">
        <span class="dot"></span>
        <span id="workspace-name">Loading workspace</span>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <p class="eyebrow">Commercial revenue operating system</p>
          <h2 id="view-title">Dashboard</h2>
        </div>
        <div class="topbar-tools">
          <button class="mobile-hamburger" id="mobile-hamburger" aria-label="Open navigation">&#9776;</button>
          <label class="search-shell" for="global-search-input">
            <span>Search companies, contacts, jobs <kbd class="kbd">Ctrl+K</kbd></span>
            <input id="global-search-input" type="search" placeholder="Type a company, person, or role">
          </label>
          <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
            <span class="theme-toggle-icon" id="theme-icon">&#9789;</span>
            <span id="theme-label">Dark</span>
          </button>
          <button class="ghost-button" id="refresh-bootstrap">Refresh snapshot</button>
        </div>
      </header>

      <div id="breadcrumbs" class="breadcrumbs"></div>
      <div id="app-alert" class="app-alert hidden"></div>
      <div id="search-results" class="search-results hidden"></div>
      <div id="app" class="view-root"></div>
    </main>
  </div>

  <div id="mobile-nav-backdrop" class="mobile-nav-backdrop"></div>
  <div id="cmd-palette-backdrop" class="cmd-palette-backdrop hidden"></div>
  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <script src="/local-api.js?v=20260425-v0-polish-setup-bg-2"></script>
  <script src="/app.js?v=20260425-v0-polish-setup-bg-2"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').then((registration) => registration.update()).catch(() => {});
    }
  </script>
</body>
</html>

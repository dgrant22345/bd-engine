<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="BD Engine Cloud — Revenue intelligence platform for staffing and recruiting teams. Track accounts, hiring signals, and outreach in one place.">
  <meta name="application-name" content="BD Engine Cloud">
  <meta name="theme-color" content="#0a0e1a">
  <title>BD Engine Cloud | Revenue Intelligence Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/cloud.css">
</head>
<body>
  <div id="cloud-root"></div>

  <script>
  (() => {
    const root = document.getElementById('cloud-root');

    // ── State ─────────────────────────────────────────────────────────────
    let state = {
      view: 'loading', // loading | landing | login | signup | app | trust | privacy | terms | security | status
      user: null,
      tenant: null,
      tenants: [],
      plan: null,
      trialDaysRemaining: null,
      error: '',
      busy: false,
    };

    // ── API helper ────────────────────────────────────────────────────────
    async function api(path, options = {}) {
      const res = await fetch(path, {
        headers: { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        ...options,
      });
      const data = res.status === 204 ? null : await res.json();
      if (!res.ok) throw new Error(data?.error || `Request failed: ${res.status}`);
      return data;
    }

    // ── Check auth status on load ─────────────────────────────────────────
    async function checkAuth() {
      cleanupServiceWorkers();
      try {
        const data = await api('/api/auth/me');
        if (data.authenticated) {
          state.user = data.user;
          state.tenant = data.tenant;
          state.tenants = data.tenants || [];
          state.plan = data.plan;
          state.trialDaysRemaining = data.trialDaysRemaining;
          state.view = 'app';
        } else {
          state.view = 'landing';
        }
      } catch {
        state.view = 'landing';
      }
      render();
    }

    async function cleanupServiceWorkers() {
      if (!('serviceWorker' in navigator)) return;
      try {
        const registrations = await navigator.serviceWorker.getRegistrations();
        await Promise.all(registrations.map((registration) => registration.unregister()));
      } catch {
        // Service worker cleanup is best-effort only.
      }
    }

    // ── Auth actions ──────────────────────────────────────────────────────
    async function doLogin(email, password) {
      state.busy = true;
      state.error = '';
      render();
      try {
        const data = await api('/api/auth/login', {
          method: 'POST',
          body: JSON.stringify({ email, password }),
        });
        state.user = data.user;
        state.tenant = data.tenant;
        state.tenants = data.tenants || [];
        state.view = 'app';
        state.error = '';
      } catch (err) {
        state.error = err.message;
      } finally {
        state.busy = false;
        render();
      }
    }

    async function doSignup(email, password, name, workspaceName, persona) {
      state.busy = true;
      state.error = '';
      render();
      try {
        const data = await api('/api/auth/signup', {
          method: 'POST',
          body: JSON.stringify({ email, password, name, workspaceName, persona: persona || 'bd' }),
        });
        state.user = data.user;
        state.tenant = data.tenant;
        state.view = 'app';
        state.error = '';
      } catch (err) {
        state.error = err.message;
      } finally {
        state.busy = false;
        render();
      }
    }

    async function doLogout() {
      try { await api('/api/auth/logout', { method: 'POST' }); } catch {}
      state.user = null;
      state.tenant = null;
      state.view = 'landing';
      state.error = '';
      render();
    }

    // ── Render ────────────────────────────────────────────────────────────
    function render() {
      switch (state.view) {
        case 'loading': return renderLoading();
        case 'landing': return renderLanding();
        case 'login': return renderLogin();
        case 'signup': return renderSignup();
        case 'app': return renderApp();
        case 'trust':
        case 'privacy':
        case 'terms':
        case 'security':
          return renderTrustSurface(state.view);
        case 'status': return renderStatusPage();
      }
    }

    function renderLoading() {
      root.innerHTML = `
        <div class="cloud-loading">
          <div class="cloud-spinner"></div>
          <p>Loading BD Engine Cloud...</p>
        </div>`;
    }

    // ── Landing page ──────────────────────────────────────────────────────
    function renderLanding() {
      root.innerHTML = `
        <div class="landing">
          <nav class="landing-nav">
            <div class="landing-nav-brand">
              <div class="brand-icon">
                <svg width="28" height="28" viewBox="0 0 28 28"><rect width="28" height="28" rx="6" fill="url(#bg)"/><path d="M7 8h6a5 5 0 010 10H7V8zm2 2v6h4a3 3 0 000-6H9z" fill="#fff"/><path d="M16 10h5a4 4 0 010 8h-5v-8zm2 2v4h3a2 2 0 000-4h-3z" fill="rgba(255,255,255,.7)"/><defs><linearGradient id="bg" x1="0" y1="0" x2="28" y2="28"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#3b82f6"/></linearGradient></defs></svg>
              </div>
              <span class="brand-text">BD Engine <span class="brand-cloud">Cloud</span></span>
            </div>
            <div class="landing-nav-actions">
              <button class="nav-link" data-trust-page="trust">Trust</button>
              <button class="nav-link" data-trust-page="status">Status</button>
              <button class="nav-link" id="nav-login">Log in</button>
              <button class="btn btn-primary btn-glow" id="nav-signup">Start free trial</button>
            </div>
          </nav>

          <section class="hero">
            <div class="hero-content">
              <div class="hero-badge">✨ Now in cloud beta</div>
              <h1 class="hero-title">
                Growth intelligence<br>
                <span class="hero-gradient">for Sales & Job Seekers</span>
              </h1>
              <p class="hero-subtitle">
                Track accounts, discover hiring signals, and orchestrate smart outreach. Built for modern BD teams and proactive job seekers to get ahead of the curve.
              </p>
              <div class="hero-cta">
                <button class="btn btn-primary btn-lg btn-glow" id="hero-signup">Start free trial</button>
              </div>
              <p class="hero-note">No credit card required · 14-day free trial · Cancel anytime</p>
            </div>
            <div class="hero-visual">
              <div class="hero-card hero-card-1">
                <div class="hero-card-header">
                  <span class="hero-card-dot green"></span>
                  <span>Pipeline Snapshot</span>
                </div>
                <div class="hero-card-body">
                  <div class="hero-stat"><span class="hero-stat-value">47</span><span class="hero-stat-label">Active accounts</span></div>
                  <div class="hero-stat"><span class="hero-stat-value">186</span><span class="hero-stat-label">Open roles tracked</span></div>
                  <div class="hero-stat"><span class="hero-stat-value">23</span><span class="hero-stat-label">Follow-ups due</span></div>
                </div>
              </div>
              <div class="hero-card hero-card-2">
                <div class="hero-card-header">
                  <span class="hero-card-dot blue"></span>
                  <span>Hiring Signal</span>
                </div>
                <div class="hero-card-body">
                  <p class="hero-signal-text"><strong>Northstar Robotics</strong> posted 6 new roles in the last 7 days</p>
                  <div class="hero-signal-bar"><div class="hero-signal-fill" style="width:84%"></div></div>
                  <p class="hero-signal-score">Target score: 91</p>
                </div>
              </div>
              <div class="hero-card hero-card-3">
                <div class="hero-card-header">
                  <span class="hero-card-dot purple"></span>
                  <span>Outreach Draft</span>
                </div>
                <div class="hero-card-body">
                  <p class="hero-draft-to">To: Priya Shah, Director of Talent</p>
                  <p class="hero-draft-preview">Hi Priya, I noticed Northstar is hiring across controls and embedded...</p>
                </div>
              </div>
            </div>
          </section>

          <section class="features" id="features">
            <h2 class="section-title">Everything you need to close more business — or land your next role</h2>
            <div class="features-grid">
              <div class="feature-card">
                <div class="feature-icon">📊</div>
                <h3>Pipeline Intelligence</h3>
                <p>See your entire pipeline at a glance. Target scores, hiring velocity, and relationship coverage — automatically ranked for sales quotas and job hunts.</p>
              </div>
              <div class="feature-card">
                <div class="feature-icon">🎯</div>
                <h3>Hiring Signals</h3>
                <p>Track ATS activity across Greenhouse, Lever, Ashby, and 20+ platforms. Know when accounts are hiring before the competition.</p>
              </div>
              <div class="feature-card">
                <div class="feature-icon">✉️</div>
                <h3>Smart Outreach</h3>
                <p>Generate personalized email and LinkedIn drafts based on live hiring data. Perfect for cold sales pitches or breaking into a target company as a candidate.</p>
              </div>
              <div class="feature-card">
                <div class="feature-icon">👥</div>
                <h3>Network Intelligence</h3>
                <p>Import your LinkedIn connections and map relationship coverage across every target account to easily find warm referrals.</p>
              </div>
              <div class="feature-card">
                <div class="feature-icon">🔄</div>
                <h3>ATS Discovery</h3>
                <p>Automatically discover and resolve ATS job boards for your target companies. No manual configuration required.</p>
              </div>
              <div class="feature-card">
                <div class="feature-icon">📈</div>
                <h3>Team Analytics</h3>
                <p>Track outreach velocity, pipeline coverage, and team performance. Leaderboards, deal velocity, and data quality scores.</p>
              </div>
            </div>
          </section>

          <section class="pricing" id="pricing">
            <h2 class="section-title">Simple, transparent pricing</h2>
            <div class="pricing-grid">
              <div class="pricing-card">
                <div class="pricing-badge">Free trial</div>
                <h3>Trial</h3>
                <div class="pricing-price"><span class="price-amount">$0</span><span class="price-period">/14 days</span></div>
                <ul class="pricing-features">
                  <li>25 accounts</li>
                  <li>100 contacts</li>
                  <li>3 job boards</li>
                  <li>Basic outreach drafts</li>
                  <li>CSV import</li>
                </ul>
                <button class="btn btn-primary btn-block" data-signup>Start free trial</button>
              </div>
              <div class="pricing-card">
                <div class="pricing-badge">For Individuals</div>
                <h3>Job Seeker</h3>
                <div class="pricing-price"><span class="price-amount">$5</span><span class="price-period">/month</span></div>
                <ul class="pricing-features">
                  <li>200 accounts</li>
                  <li>1,000 contacts</li>
                  <li>10 job boards</li>
                  <li>CSV import</li>
                  <li>1 user</li>
                </ul>
                <button class="btn btn-primary btn-block" data-signup>Get started</button>
              </div>
              <div class="pricing-card pricing-card--popular">
                <div class="pricing-badge popular">For Teams</div>
                <h3>Sales Professional</h3>
                <div class="pricing-price"><span class="price-amount">$10</span><span class="price-period">/month</span></div>
                <ul class="pricing-features">
                  <li>1,000 accounts</li>
                  <li>10,000 contacts</li>
                  <li>100 job boards</li>
                  <li>Enrichment + Outreach Drafts</li>
                  <li>CSV export</li>
                  <li>3 team members</li>
                </ul>
                <button class="btn btn-primary btn-block btn-glow" data-signup>Get started</button>
              </div>
            </div>
          </section>

          <footer class="landing-footer">
            <div class="landing-footer-brand">
              <span class="brand-text">BD Engine <span class="brand-cloud">Cloud</span></span>
            </div>
            <div class="landing-footer-links">
              <button class="link-btn" data-trust-page="trust">Trust</button>
              <button class="link-btn" data-trust-page="privacy">Privacy</button>
              <button class="link-btn" data-trust-page="terms">Terms</button>
              <button class="link-btn" data-trust-page="security">Security</button>
              <button class="link-btn" data-trust-page="status">Status</button>
            </div>
            <p class="landing-footer-copy">&copy; ${new Date().getFullYear()} BD Engine. Built for staffing and recruiting teams.</p>
          </footer>
        </div>`;

      // Wire events
      root.querySelector('#nav-login')?.addEventListener('click', () => { state.view = 'login'; render(); });
      root.querySelector('#nav-signup')?.addEventListener('click', () => { state.view = 'signup'; render(); });
      root.querySelector('#hero-signup')?.addEventListener('click', () => { state.view = 'signup'; render(); });
      root.querySelectorAll('[data-signup]').forEach(btn => btn.addEventListener('click', () => { state.view = 'signup'; render(); }));
      root.querySelectorAll('[data-trust-page]').forEach(btn => btn.addEventListener('click', () => { state.view = btn.dataset.trustPage; render(); }));
    }

    function getTrustContent(kind) {
      const updated = 'April 26, 2026';
      const shared = {
        updated,
        support: 'Support: support@bdengine.io',
      };
      const pages = {
        trust: {
          eyebrow: 'Trust center',
          title: 'Built for responsible recruiting and BD workflows',
          intro: 'BD Engine Cloud helps users organize account, contact, job, and outreach signals. We keep trust surfaces visible before launch so buyers can understand how the product handles data.',
          sections: [
            ['Data use', 'The app stores workspace data you import or create, including company records, contacts, jobs, notes, activity, and settings. Use only data you have the right to process.'],
            ['Payments', 'Paid plans are intended to run through Stripe Checkout. Billing credentials are handled by Stripe, not stored in BD Engine Cloud.'],
            ['User control', 'Users can log out, manage workspace data inside the app, and request help through support. Cancellation and plan management should remain visible in Billing.'],
            ['Operational health', 'The public status page reports server, database, and Stripe configuration health without exposing secrets or private workspace data.'],
          ],
          cta: 'Start free trial',
        },
        privacy: {
          eyebrow: 'Privacy notice',
          title: 'Plain-language privacy basics',
          intro: 'This launch notice explains the practical data boundaries for BD Engine Cloud. It should be reviewed by counsel before broad commercial launch.',
          sections: [
            ['Information collected', 'Account profile data, workspace names, imported company/contact data, job-board configuration, activity notes, and product usage needed to operate the app.'],
            ['How it is used', 'To authenticate users, provide the workspace, rank accounts, show hiring and relationship signals, support imports, and manage subscriptions.'],
            ['Processors', 'Railway hosts the app infrastructure. Stripe may process checkout and subscription billing when enabled.'],
            ['Retention and deletion', 'Workspace data should be retained while the account is active and removed or exported on verified customer request where legally appropriate.'],
          ],
          cta: 'Create account',
        },
        terms: {
          eyebrow: 'Terms summary',
          title: 'Launch terms for early customers',
          intro: 'These terms are a concise launch surface, not a substitute for a final legal agreement.',
          sections: [
            ['Acceptable use', 'Do not use BD Engine Cloud for spam, unlawful outreach, scraping abuse, credential sharing, or processing data you are not allowed to use.'],
            ['Customer responsibility', 'You are responsible for the legality, accuracy, and compliance of imported contacts, outreach, and job-signal use.'],
            ['Subscription', 'Paid access is month-to-month unless otherwise agreed. Users should be able to cancel from Billing once Stripe is connected.'],
            ['No guarantee', 'Hiring signals, scores, and drafts are decision-support tools and may be incomplete or wrong. Review before acting.'],
          ],
          cta: 'Review pricing',
        },
        security: {
          eyebrow: 'Security basics',
          title: 'Security controls for launch readiness',
          intro: 'The product is moving from prototype to commercial service. These are the minimum controls exposed to customers and operators.',
          sections: [
            ['Authentication', 'Sessions use secure HTTP-only cookies in production. Passwords are hashed before storage.'],
            ['Secrets', 'Stripe and database secrets must live in Railway environment variables, never in the client bundle or repository.'],
            ['Monitoring', 'Health endpoints expose sanitized server, database, Stripe, uptime, and request metrics. They do not expose customer records.'],
            ['Incident contact', 'Security or privacy concerns should be sent to support@bdengine.io until a dedicated security inbox is created.'],
          ],
          cta: 'Open status',
        },
      };
      return { ...shared, ...pages[kind] };
    }

    function renderTrustSurface(kind) {
      const content = getTrustContent(kind);
      root.innerHTML = `
        <div class="trust-page">
          <nav class="landing-nav trust-nav">
            <div class="landing-nav-brand">
              <div class="brand-icon"><svg width="28" height="28" viewBox="0 0 28 28"><rect width="28" height="28" rx="6" fill="url(#trustBg)"/><path d="M7 8h6a5 5 0 010 10H7V8zm2 2v6h4a3 3 0 000-6H9z" fill="#fff"/><path d="M16 10h5a4 4 0 010 8h-5v-8zm2 2v4h3a2 2 0 000-4h-3z" fill="rgba(255,255,255,.7)"/><defs><linearGradient id="trustBg" x1="0" y1="0" x2="28" y2="28"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#3b82f6"/></linearGradient></defs></svg></div>
              <span class="brand-text">BD Engine <span class="brand-cloud">Cloud</span></span>
            </div>
            <button class="nav-link" data-back-home>Back home</button>
          </nav>
          <main class="trust-main">
            <p class="hero-badge">${escapeHtml(content.eyebrow)}</p>
            <h1>${escapeHtml(content.title)}</h1>
            <p class="trust-intro">${escapeHtml(content.intro)}</p>
            <div class="trust-meta">
              <span>Last updated ${escapeHtml(content.updated)}</span>
              <span>${escapeHtml(content.support)}</span>
            </div>
            <div class="trust-grid">
              ${content.sections.map(([title, body]) => `
                <article class="trust-doc-card">
                  <h2>${escapeHtml(title)}</h2>
                  <p>${escapeHtml(body)}</p>
                </article>
              `).join('')}
            </div>
            <div class="trust-actions">
              <button class="btn btn-primary" data-trust-cta>${escapeHtml(content.cta)}</button>
              <button class="btn btn-ghost" data-trust-page="status">View status</button>
            </div>
          </main>
        </div>`;

      root.querySelector('[data-back-home]')?.addEventListener('click', () => { state.view = 'landing'; render(); });
      root.querySelector('[data-trust-cta]')?.addEventListener('click', () => {
        state.view = kind === 'security' ? 'status' : 'signup';
        render();
      });
      root.querySelectorAll('[data-trust-page]').forEach(btn => btn.addEventListener('click', () => { state.view = btn.dataset.trustPage; render(); }));
    }

    async function renderStatusPage() {
      root.innerHTML = `
        <div class="trust-page">
          <nav class="landing-nav trust-nav">
            <div class="landing-nav-brand"><span class="brand-text">BD Engine <span class="brand-cloud">Cloud</span></span></div>
            <button class="nav-link" data-back-home>Back home</button>
          </nav>
          <main class="trust-main">
            <p class="hero-badge">System status</p>
            <h1>Production health</h1>
            <p class="trust-intro">A sanitized status view for launch checks. It reports service configuration and health without exposing secrets or workspace data.</p>
            <div id="status-panel" class="status-panel">Loading status...</div>
          </main>
        </div>`;
      root.querySelector('[data-back-home]')?.addEventListener('click', () => { state.view = 'landing'; render(); });
      try {
        const status = await api('/api/status');
        const checks = status.checks || {};
        const metrics = status.metrics || {};
        const panel = root.querySelector('#status-panel');
        if (!panel) return;
        panel.innerHTML = `
          <div class="status-grid">
            ${renderStatusCheck('Server', checks.server, `Uptime ${Math.round((status.uptimeSeconds || 0) / 60)}m`)}
            ${renderStatusCheck('Database', checks.databaseConfigured ? checks.databaseConnected : true, checks.databaseConfigured ? 'Configured' : 'In-memory mode')}
            ${renderStatusCheck('Stripe', checks.stripeCommercialReady, checks.stripeCommercialReady ? 'Live checkout ready' : (checks.stripeReady ? `Checkout is in ${checks.stripeMode || 'unknown'} mode` : `Missing ${(checks.stripeMissing || []).join(', ') || 'configuration'}`))}
            ${renderStatusCheck('Requests', true, `${metrics.requestCount || 0} served`)}
          </div>
          <pre class="status-json">${escapeHtml(JSON.stringify({ mode: status.mode, metrics, lastError: status.lastError || null }, null, 2))}</pre>
        `;
      } catch (err) {
        const panel = root.querySelector('#status-panel');
        if (panel) panel.innerHTML = `<div class="auth-error">Status check failed: ${escapeHtml(err.message || err)}</div>`;
      }
    }

    function renderStatusCheck(label, ok, detail) {
      return `<article class="status-check ${ok ? 'status-check--ok' : 'status-check--warn'}"><strong>${escapeHtml(label)}</strong><span>${ok ? 'OK' : 'Needs setup'}</span><small>${escapeHtml(detail || '')}</small></article>`;
    }

    // ── Login page ────────────────────────────────────────────────────────
    function renderLogin() {
      root.innerHTML = `
        <div class="auth-page">
          <div class="auth-card">
            <div class="auth-header">
              <div class="brand-icon-sm">
                <svg width="32" height="32" viewBox="0 0 28 28"><rect width="28" height="28" rx="6" fill="url(#bg2)"/><path d="M7 8h6a5 5 0 010 10H7V8zm2 2v6h4a3 3 0 000-6H9z" fill="#fff"/><path d="M16 10h5a4 4 0 010 8h-5v-8zm2 2v4h3a2 2 0 000-4h-3z" fill="rgba(255,255,255,.7)"/><defs><linearGradient id="bg2" x1="0" y1="0" x2="28" y2="28"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#3b82f6"/></linearGradient></defs></svg>
              </div>
              <h2>Welcome back</h2>
              <p>Log in to your BD Engine Cloud account</p>
            </div>
            ${state.error ? `<div class="auth-error">${escapeHtml(state.error)}</div>` : ''}
            <form id="login-form" class="auth-form">
              <div class="form-group">
                <label for="login-email">Email</label>
                <input type="email" id="login-email" placeholder="you@company.com" required autofocus>
              </div>
              <div class="form-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" placeholder="••••••••" required minlength="6">
              </div>
              <button type="submit" class="btn btn-primary btn-block btn-lg" ${state.busy ? 'disabled' : ''}>
                ${state.busy ? '<span class="btn-spinner"></span> Logging in...' : 'Log in'}
              </button>
            </form>
            <div class="auth-footer">
              <p>Don't have an account? <button class="link-btn" id="goto-signup">Sign up free</button></p>
              <button class="link-btn" id="goto-landing">← Back to home</button>
            </div>
          </div>
        </div>`;

      root.querySelector('#login-form')?.addEventListener('submit', (e) => {
        e.preventDefault();
        const email = root.querySelector('#login-email').value;
        const password = root.querySelector('#login-password').value;
        doLogin(email, password);
      });
      root.querySelector('#goto-signup')?.addEventListener('click', () => { state.view = 'signup'; state.error = ''; render(); });
      root.querySelector('#goto-landing')?.addEventListener('click', () => { state.view = 'landing'; state.error = ''; render(); });
    }

    // ── Signup page ───────────────────────────────────────────────────────
    function renderSignup() {
      root.innerHTML = `
        <div class="auth-page">
          <div class="auth-card">
            <div class="auth-header">
              <div class="brand-icon-sm">
                <svg width="32" height="32" viewBox="0 0 28 28"><rect width="28" height="28" rx="6" fill="url(#bg3)"/><path d="M7 8h6a5 5 0 010 10H7V8zm2 2v6h4a3 3 0 000-6H9z" fill="#fff"/><path d="M16 10h5a4 4 0 010 8h-5v-8zm2 2v4h3a2 2 0 000-4h-3z" fill="rgba(255,255,255,.7)"/><defs><linearGradient id="bg3" x1="0" y1="0" x2="28" y2="28"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#3b82f6"/></linearGradient></defs></svg>
              </div>
              <h2>Create your account</h2>
              <p>Start your 14-day free trial — no credit card required</p>
            </div>
            ${state.error ? `<div class="auth-error">${escapeHtml(state.error)}</div>` : ''}
            <form id="signup-form" class="auth-form">
              <div class="form-group">
                <label>I'm using BD Engine for</label>
                <div class="persona-toggle" id="persona-toggle">
                  <button type="button" class="persona-option active" data-persona="bd">
                    <span class="persona-icon">💼</span>
                    <span class="persona-label">Sales / BD</span>
                    <span class="persona-desc">Win new clients &amp; grow revenue</span>
                  </button>
                  <button type="button" class="persona-option" data-persona="jobseeker">
                    <span class="persona-icon">🎯</span>
                    <span class="persona-label">Job Search</span>
                    <span class="persona-desc">Track companies &amp; land roles</span>
                  </button>
                </div>
              </div>
              <div class="form-group">
                <label for="signup-name">Full name</label>
                <input type="text" id="signup-name" placeholder="Jane Smith" required autofocus>
              </div>
              <div class="form-group">
                <label for="signup-email">Email</label>
                <input type="email" id="signup-email" placeholder="jane@company.com" required>
              </div>
              <div class="form-group">
                <label for="signup-password">Password</label>
                <input type="password" id="signup-password" placeholder="Min. 6 characters" required minlength="6">
              </div>
              <div class="form-group">
                <label for="signup-workspace" id="workspace-label">Workspace name</label>
                <input type="text" id="signup-workspace" placeholder="My Company">
              </div>
              <button type="submit" class="btn btn-primary btn-block btn-lg" ${state.busy ? 'disabled' : ''}>
                ${state.busy ? '<span class="btn-spinner"></span> Creating account...' : 'Create account'}
              </button>
            </form>
            <div class="auth-footer">
              <p>Already have an account? <button class="link-btn" id="goto-login">Log in</button></p>
              <button class="link-btn" id="goto-landing">← Back to home</button>
            </div>
          </div>
        </div>`;

      // Persona toggle
      let selectedPersona = 'bd';
      root.querySelectorAll('.persona-option').forEach(btn => {
        btn.addEventListener('click', () => {
          root.querySelectorAll('.persona-option').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          selectedPersona = btn.dataset.persona;
          // Update workspace label based on persona
          const wsLabel = root.querySelector('#workspace-label');
          const wsInput = root.querySelector('#signup-workspace');
          if (selectedPersona === 'jobseeker') {
            wsLabel.textContent = 'Your name for this search';
            wsInput.placeholder = 'My Job Search 2026';
          } else {
            wsLabel.textContent = 'Workspace name';
            wsInput.placeholder = 'My Company';
          }
        });
      });

      root.querySelector('#signup-form')?.addEventListener('submit', (e) => {
        e.preventDefault();
        const name = root.querySelector('#signup-name').value;
        const email = root.querySelector('#signup-email').value;
        const password = root.querySelector('#signup-password').value;
        const workspace = root.querySelector('#signup-workspace').value;
        doSignup(email, password, name, workspace, selectedPersona);
      });
      root.querySelector('#goto-login')?.addEventListener('click', () => { state.view = 'login'; state.error = ''; render(); });
      root.querySelector('#goto-landing')?.addEventListener('click', () => { state.view = 'landing'; state.error = ''; render(); });
    }

    // ── App shell — cloud topbar plus the shared BD Engine frontend ──────────
    function renderApp() {
      const planBadge = state.plan ? state.plan.displayName : 'Trial';
      const trialNotice = state.trialDaysRemaining !== null && state.trialDaysRemaining <= 14
        ? `<span class="cloud-trial-badge">${state.trialDaysRemaining}d left</span>` : '';

      root.innerHTML = `
        <div class="cloud-shell">
          <div class="cloud-topbar">
            <div class="cloud-topbar-left">
              <div class="brand-icon-xs">
                <svg width="22" height="22" viewBox="0 0 28 28"><rect width="28" height="28" rx="6" fill="url(#bg4)"/><path d="M7 8h6a5 5 0 010 10H7V8zm2 2v6h4a3 3 0 000-6H9z" fill="#fff"/><path d="M16 10h5a4 4 0 010 8h-5v-8zm2 2v4h3a2 2 0 000-4h-3z" fill="rgba(255,255,255,.7)"/><defs><linearGradient id="bg4" x1="0" y1="0" x2="28" y2="28"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#3b82f6"/></linearGradient></defs></svg>
              </div>
              <span class="cloud-app-name">BD Engine <span class="brand-cloud">Cloud</span></span>
              <span class="cloud-plan-badge">${escapeHtml(planBadge)}</span>
              ${trialNotice}
            </div>
            <div class="cloud-topbar-right">
              <span class="cloud-workspace">${escapeHtml(state.tenant?.name || 'Workspace')}</span>
              <div class="cloud-user-menu" id="cloud-user-menu">
                <button class="cloud-avatar" id="cloud-avatar-btn">
                  ${(state.user?.name || 'U').charAt(0).toUpperCase()}
                </button>
                <div class="cloud-user-dropdown hidden" id="cloud-user-dropdown">
                  <div class="cloud-user-info">
                    <strong>${escapeHtml(state.user?.name || '')}</strong>
                    <span>${escapeHtml(state.user?.email || '')}</span>
                  </div>
                  <hr>
                  <button class="cloud-menu-item" id="cloud-billing-btn">💳 Billing & Plan</button>
                  <button class="cloud-menu-item" id="cloud-logout-btn">🚪 Log out</button>
                </div>
              </div>
            </div>
          </div>
          <div class="cloud-app-container">
            <iframe class="cloud-app-frame" title="BD Engine workspace" src="/app/#/dashboard"></iframe>
          </div>
        </div>`;

      // Wire user menu
      const avatarBtn = root.querySelector('#cloud-avatar-btn');
      const dropdown = root.querySelector('#cloud-user-dropdown');
      avatarBtn?.addEventListener('click', () => dropdown?.classList.toggle('hidden'));
      document.addEventListener('click', (e) => {
        if (!e.target.closest('#cloud-user-menu')) dropdown?.classList.add('hidden');
      });
      root.querySelector('#cloud-logout-btn')?.addEventListener('click', doLogout);
      root.querySelector('#cloud-billing-btn')?.addEventListener('click', () => {
        const frame = root.querySelector('.cloud-app-frame');
        if (frame) frame.src = '/app/#/admin/billing';
        dropdown?.classList.add('hidden');
      });
    }

    // ── Utility ───────────────────────────────────────────────────────────
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = String(str || '');
      return div.innerHTML;
    }

    // ── Init ──────────────────────────────────────────────────────────────
    render();
    checkAuth();
  })();
  </script>
</body>
</html>
